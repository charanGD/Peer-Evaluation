<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register – Peer Evaluation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Register for the Peer-to-Peer Evaluation Platform" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="background"></div>

  <div class="container">
    <div class="brand-icon">📊</div>
    <h2 class="form-title">Create Account</h2>
    <p class="info-text">
      Register to start evaluating your peers.
    </p>

    <form id="register-form">
      <input
        type="text"
        id="name"
        placeholder="Full Name"
        required
      />

      <input
        type="email"
        id="email"
        placeholder="Email Address"
        required
      />

      <div class="password-wrapper">
        <input
          type="password"
          id="password"
          placeholder="Create Password"
          required
        />
        <span id="togglePassword">👁</span>
      </div>

      <select id="role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>

      <button type="submit">REGISTER</button>
    </form>

    <p class="forgot">
      Already have an account? <a href="index.html">Login here</a>
    </p>
  </div>

  <script>
    const API = "http://localhost:5000/api";

    // Toggle password visibility
    document.getElementById("togglePassword").addEventListener("click", () => {
      const pw = document.getElementById("password");
      if (pw.type === "password") {
        pw.type = "text";
        document.getElementById("togglePassword").textContent = "⊘";
      } else {
        pw.type = "password";
        document.getElementById("togglePassword").textContent = "👁";
      }
    });

    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const role = document.getElementById("role").value;

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password, role })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.message);
          return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user));

        alert("Registration successful! 🎉");

        if (data.user.role === "admin") {
          window.location.href = "admin-dashbaord/admin.html";
        } else {
          window.location.href = "student-dashboard/dashboard.html";
        }
      } catch (error) {
        console.error(error);
        alert("Server error. Please try again.");
      }
    });
  </script>
</body>
</html>
