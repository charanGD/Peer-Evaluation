<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sathyabama Student Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background image -->
  <div class="page-bg"></div>

  <!-- Centered login card -->
  <div class="login-wrapper">
    <div class="login-card">
      <!-- Logo banner -->
      <div class="logo-wrapper">
        <!-- Put your logo image as sathyabama-logo.png in same folder -->
        <img src="sathyabama-logo.png" alt="Sathyabama Logo" class="logo-img" />
      </div>

      <!-- Info text -->
      <p class="info-text">
        Enter your RegNo and DOB to<br />
        access student panel.
      </p>

      <!-- Login form -->
      <form id="login-form" novalidate>
        <!-- User type dropdown -->
        <div class="form-group">
          <select id="userType" name="userType" required>
            <option value="new_admission">New Admission</option>
            <option value="staff">Staff</option>
            <option value="student" selected>Student</option>
            <option value="parents">Parents</option>
          </select>
        </div>

        <!-- Register Number -->
        <div class="form-group">
          <label for="regNo">Register Number</label>
          <input
            type="text"
            id="regNo"
            name="regNo"
            placeholder="Register Number"
            required
          />
        </div>

        <!-- Password -->
       <div class="form-group">
  <label for="password">Password</label>
  <div class="password-wrapper">
    <input
      type="password"
      id="password"
      name="password"
      placeholder="Enter Password"
      required
    />
    <button type="button" class="eye-btn" id="togglePassword">
      👁
    </button>
  </div>
</div>


        <!-- Log in button -->
        <button type="submit" class="btn-login">LOG IN</button>
      </form>
    </div>
  </div>

  <!-- Forgot password text outside card -->
  <div class="forgot-wrapper">
    <a href="#" class="forgot-link">Forgot your password?</a>
  </div>

  <script src="web.js"></script>
</body>
</html>
