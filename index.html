<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sathyabama Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background -->
  <div class="page-bg"></div>

  <!-- Login Card -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo -->
      <div class="logo-wrapper">
        <img src="sathyabama-logo.png" alt="Sathyabama Logo" class="logo-img" />
      </div>

      <!-- Info -->
      <p class="info-text" id="infoText">
        Enter your Register Number and Password to access student panel.
      </p>

      <!-- Form -->
      <form id="login-form" novalidate>

        <!-- User Type -->
        <div class="form-group">
          <select id="userType" required>
            <option value="student" selected>Student</option>
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <!-- ID -->
        <div class="form-group">
          <label id="idLabel">Register Number</label>
          <input
            type="text"
            id="userId"
            placeholder="Enter Register Number"
            required
          />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              placeholder="Enter Password"
              required
            />
            <button type="button" id="togglePassword" class="eye-btn">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-login">LOG IN</button>
      </form>
    </div>
  </div>

  <!-- Forgot -->
  <div class="forgot-wrapper">
    <a href="#" class="forgot-link">Forgot your password?</a>
  </div>

  <script src="web.js"></script>
</body>
</html>
